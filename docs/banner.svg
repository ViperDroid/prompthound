<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" height="220" role="img" aria-label="prompthound">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="880" height="220" rx="20" fill="url(#bg)"/>
  <rect x="2" y="2" width="876" height="216" rx="18" fill="none" stroke="#2a3340" stroke-width="2"/>

  <!-- magnifier + shield mark -->
  <g transform="translate(70,110)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#accent)" stroke-width="7"/>
    <line x1="30" y1="30" x2="64" y2="64" stroke="url(#accent)" stroke-width="9" stroke-linecap="round"/>
    <!-- shield inside lens -->
    <path d="M0,-26 L22,-16 L22,4 C22,20 12,28 0,32 C-12,28 -22,20 -22,4 L-22,-16 Z" fill="#7c3aed" opacity="0.9"/>
    <path d="M-9,2 L-2,10 L11,-8" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="150" y="98" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff">prompt<tspan fill="url(#accent)">hound</tspan></text>
  <text x="152" y="134" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#aab4c2">Sniffs out insecure AI/LLM code — before attackers do.</text>

  <g transform="translate(152,158)" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">
    <g><rect x="0" y="0" width="150" height="30" rx="15" fill="#1f2937" stroke="#374151"/><text x="16" y="20" fill="#e5e7eb">leaked keys</text></g>
    <g transform="translate(162,0)"><rect x="0" y="0" width="180" height="30" rx="15" fill="#1f2937" stroke="#374151"/><text x="16" y="20" fill="#e5e7eb">prompt-injection sinks</text></g>
    <g transform="translate(354,0)"><rect x="0" y="0" width="200" height="30" rx="15" fill="#1f2937" stroke="#374151"/><text x="16" y="20" fill="#e5e7eb">LLM output → RCE / XSS</text></g>
  </g>
  <text x="700" y="200" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6b7280">by ViperDroid</text>
</svg>
