<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200" role="img" aria-label="how prompthound works">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="880" height="200" rx="16" fill="#0d1117" stroke="#2a3340" stroke-width="1.5"/>

  <!-- node 1: codebase -->
  <g>
    <rect x="30" y="66" width="180" height="68" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="120" y="96" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Your codebase</text>
    <text x="120" y="116" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b949e">.py  .js  .ts</text>
  </g>
  <line x1="215" y1="100" x2="290" y2="100" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- node 2: scan -->
  <g>
    <rect x="295" y="60" width="200" height="80" rx="14" fill="#1b1030" stroke="url(#a)" stroke-width="2"/>
    <text x="395" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">🐶 prompthound</text>
    <text x="395" y="114" text-anchor="middle" font-family="monospace" font-size="12" fill="#a78bfa">20 rules · zero deps</text>
  </g>
  <line x1="500" y1="100" x2="575" y2="100" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- node 3: outputs stacked -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <g>
      <rect x="580" y="30" width="270" height="42" rx="10" fill="#161b22" stroke="#30363d"/>
      <text x="600" y="56" fill="#e6edf3">📋 Triaged report</text>
    </g>
    <g>
      <rect x="580" y="80" width="270" height="42" rx="10" fill="#161b22" stroke="#30363d"/>
      <text x="600" y="106" fill="#e6edf3">🛡️ SARIF → GitHub Security tab</text>
    </g>
    <g>
      <rect x="580" y="130" width="270" height="42" rx="10" fill="#161b22" stroke="#30363d"/>
      <text x="600" y="156" fill="#e6edf3">🚦 CI gate (exit code)</text>
    </g>
  </g>
</svg>
