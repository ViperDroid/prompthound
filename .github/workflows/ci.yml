name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .
      - name: Run tests
        run: |
          pip install pytest
          pytest -q
      - name: Self-scan the examples (should find issues)
        run: |
          prompthound examples/ || echo "findings reported (expected for the vulnerable samples)"
